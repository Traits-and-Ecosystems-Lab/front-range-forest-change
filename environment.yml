name: esiil-stars
channels:
  - conda-forge

dependencies:
  # ── Core Python ──────────────────────────────────
  - python=3.11
  - pip

  # ── Jupyter environment ──────────────────────────
  - jupyterlab>=4.0
  - ipykernel
  - ipywidgets>=8.0
  - jupyter_bokeh

  # ── Geospatial core ─────────────────────────────
  - gdal>=3.6
  - libgdal
  - rasterio
  - geopandas>=0.14
  - shapely>=2.0
  - fiona
  - pyproj
  - rioxarray
  - xarray
  - rasterstats
  - geocube

  # ── Google Earth Engine ──────────────────────────
  - earthengine-api>=0.1.390
  - geemap>=0.32

  # ── Static visualization ─────────────────────────
  - matplotlib>=3.8
  - seaborn>=0.13

  # ── Interactive visualization ────────────────────
  - hvplot>=0.9
  - holoviews>=1.18
  - bokeh>=3.3
  - geoviews>=1.11
  - panel>=1.3
  - datashader
  - folium>=0.15
  - plotly>=5.18

  # ── Data handling ────────────────────────────────
  - pandas>=2.1
  - numpy>=1.26
  - scipy>=1.12

  # ── Utilities ────────────────────────────────────
  - earthpy
  - tqdm
  - pyyaml
  - requests
  - dask
